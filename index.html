<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday 🎉</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ff4e8a,#6a5cff);
      color:white;
      text-align:center;
      position:relative;
    }

    .container{
      z-index:2;
      animation:fadeIn 2s ease;
      padding:20px;
    }

    h1{
      font-size:65px;
      margin-bottom:15px;
      animation:glow 2s infinite alternate;
    }

    p{
      font-size:22px;
      max-width:700px;
      margin:auto;
      line-height:1.8;
    }

    .btn{
      margin-top:30px;
      padding:15px 35px;
      border:none;
      border-radius:50px;
      background:white;
      color:#ff4e8a;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 0 20px rgba(255,255,255,0.5);
    }

    .btn:hover{
      transform:scale(1.1);
      background:#ffe5f0;
    }

    /* Confetti */
    .confetti{
      position:absolute;
      width:10px;
      height:10px;
      background:white;
      top:-10px;
      animation:fall linear infinite;
      opacity:0.8;
    }

    @keyframes fall{
      to{
        transform:translateY(110vh) rotate(720deg);
      }
    }

    @keyframes glow{
      from{
        text-shadow:0 0 10px white,
                    0 0 20px #ff9bd2,
                    0 0 40px #ff4e8a;
      }
      to{
        text-shadow:0 0 20px white,
                    0 0 40px #ffd1e8,
                    0 0 60px #ff4e8a;
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .heart{
      color:#ffdde9;
      font-size:30px;
      animation:beat 1s infinite;
      display:inline-block;
    }

    @keyframes beat{
      0%{transform:scale(1);}
      50%{transform:scale(1.3);}
      100%{transform:scale(1);}
    }

    audio{
      display:none;
    }
  </style>
</head>
<body>

  <!-- Musik -->
  <audio autoplay loop>
    <source src="https://files.catbox.moe/6r6q3h.mp3" type="audio/mpeg">
  </audio>

  <!-- Isi -->
  <div class="container">
    <h1>🎂 Happy Birthday 🎂</h1>

    <p>
      Selamat ulang tahun Queen 💖<br><br>
      Semoga panjang umur, sehat selalu, dan semua impianmu tercapai.
      Terima kasih sudah hadir dan membuat dunia jadi lebih indah. ✨
      Jangan lupa selalu tersenyum yaa <span class="heart">❤</span>
    </p>

    <button class="btn" onclick="showMessage()">
      Klik Surprise 🎁
    </button>
  </div>

  <script>
    // Confetti
    for(let i=0;i<120;i++){
      let confetti=document.createElement("div");
      confetti.classList.add("confetti");

      confetti.style.left=Math.random()*100+"vw";
      confetti.style.animationDuration=(Math.random()*3+2)+"s";
      confetti.style.backgroundColor=`hsl(${Math.random()*360},100%,70%)`;
      confetti.style.width=confetti.style.height=(Math.random()*8+5)+"px";

      document.body.appendChild(confetti);
    }

    // Surprise Button
    function showMessage(){
      alert("🎉 Semoga harimu seindah senyummu 🎂💖");
    }
  </script>

</body>
</html>
